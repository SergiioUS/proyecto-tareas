<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas - Gestor de Tareas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
<div id="loginContainer" class="card p-4 shadow" style="width: 100%; max-width: 400px;">
<div class="card-body">
<h1 class="card-title text-center mb-4">Iniciar Sesión</h1>
<div class="mb-3">
<input type="text" id="username" class="form-control" placeholder="Usuario">
</div>
<div class="mb-3">
<input type="password" id="password" class="form-control" placeholder="Contraseña">
</div>
<button onclick="login()" class="btn btn-primary w-100">Iniciar Sesión</button>
<p id="loginMessage" class="text-danger mt-3 text-center"></p>
</div>
</div>

<div id="app" class="card p-4 shadow" style="width: 100%; max-width: 1000px; display: none;">
<div class="card-body">
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4 rounded">
<div class="container-fluid">
<a class="navbar-brand" href="#"><i class="fas fa-tasks"></i> Gestor de Tareas</a>
<div class="d-flex">
<span class="navbar-text me-3" id="userDisplay">Usuario: </span>
<button onclick="logout()" class="btn btn-outline-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
</div>
</div>
</nav>

<ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
<li class="nav-item" role="presentation">
<button class="nav-link active" id="tareas-tab" data-bs-toggle="tab" data-bs-target="#tareas" type="button" role="tab" aria-controls="tareas" aria-selected="true"><i class="fas fa-list"></i> Tareas</button>
</li>
<li class="nav-item" role="presentation">
<button class="nav-link" id="estadisticas-tab" data-bs-toggle="tab" data-bs-target="#estadisticas" type="button" role="tab" aria-controls="estadisticas" aria-selected="false"><i class="fas fa-chart-bar"></i> Estadísticas</button>
</li>
</ul>
<div class="tab-content" id="myTabContent">
<div class="tab-pane fade show active" id="tareas" role="tabpanel" aria-labelledby="tareas-tab">

<div class="d-flex justify-content-between align-items-center mb-3">
<div>
<span id="contador" class="badge bg-secondary">0 tareas</span>
</div>
<div>
<button id="themeToggle" class="btn btn-outline-secondary btn-sm" onclick="toggleTheme()"><i class="fas fa-moon"></i> Tema</button>
</div>
</div>

<div class="mb-3">
<input type="text" id="searchInput" class="form-control" placeholder="Buscar tareas..." oninput="buscarTareas()">
</div>

<div class="row g-3 mb-4">
<div class="col-md-3">
<input type="text" id="tareaInput" class="form-control" placeholder="Escribe Algo">
</div>
<div class="col-md-2">
<select id="categoria" class="form-select">
<option value="General">General</option>
<option value="Trabajo">Trabajo</option>
<option value="Personal">Personal</option>
</select>
</div>
<div class="col-md-2">
<select id="prioridad" class="form-select">
<option value="Baja">Baja</option>
<option value="Media">Media</option>
<option value="Alta">Alta</option>
</select>
</div>
<div class="col-md-3">
<input type="date" id="fecha" class="form-control">
</div>
<div class="col-md-2">
<button onclick="agregarTarea()" class="btn btn-success w-100">Agregar</button>
</div>
</div>

<div class="row g-3 mb-4">
<div class="col-md-4">
<label class="form-label">Filtrar por categoría:</label>
<select id="filterCategoria" class="form-select" onchange="filtrarTareas()">
<option value="">Todas</option>
<option value="General">General</option>
<option value="Trabajo">Trabajo</option>
<option value="Personal">Personal</option>
</select>
</div>
<div class="col-md-4">
<label class="form-label">Prioridad:</label>
<select id="filterPrioridad" class="form-select" onchange="filtrarTareas()">
<option value="">Todas</option>
<option value="Baja">Baja</option>
<option value="Media">Media</option>
<option value="Alta">Alta</option>
</select>
</div>
</div>

<ul id="listaTareas" class="list-group mb-4"></ul>

</div>
<div class="tab-pane fade" id="estadisticas" role="tabpanel" aria-labelledby="estadisticas-tab">

<div id="stats" class="row g-3">
<div class="col-md-4">
<div class="card text-center">
<div class="card-body">
<h5 class="card-title text-success"><i class="fas fa-check-circle"></i> Completadas</h5>
<p class="card-text" id="completadas">0</p>
</div>
</div>
</div>
<div class="col-md-4">
<div class="card text-center">
<div class="card-body">
<h5 class="card-title text-warning"><i class="fas fa-clock"></i> Pendientes</h5>
<p class="card-text" id="pendientes">0</p>
</div>
</div>
</div>
<div class="col-md-4">
<div class="card text-center">
<div class="card-body">
<h5 class="card-title text-info"><i class="fas fa-calendar-alt"></i> Con Fecha</h5>
<p class="card-text" id="conFecha">0</p>
</div>
</div>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
