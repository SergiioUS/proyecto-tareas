<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas - Gestor de Tareas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
<div id="loginContainer" class="card p-4 shadow" style="width: 100%; max-width: 400px;">
<div class="card-body">
<h1 class="card-title text-center mb-4">Iniciar Sesión</h1>
<div class="mb-3">
<input type="text" id="username" class="form-control" placeholder="Usuario">
</div>
<div class="mb-3">
<input type="password" id="password" class="form-control" placeholder="Contraseña">
</div>
<button onclick="login()" class="btn btn-primary w-100">Iniciar Sesión</button>
<p id="loginMessage" class="text-danger mt-3 text-center"></p>
</div>
</div>

<div id="app" class="card p-4 shadow" style="width: 100%; max-width: 800px; display: none;">
<div class="card-body">
<h1 class="card-title text-center mb-2">Tareas</h1>
<p class="text-muted text-center mb-4">Organiza tus tareas</p>

<div class="row g-3 mb-4">
<div class="col-md-3">
<input type="text" id="tareaInput" class="form-control" placeholder="Escribe Algo">
</div>
<div class="col-md-2">
<select id="categoria" class="form-select">
<option value="General">General</option>
<option value="Trabajo">Trabajo</option>
<option value="Personal">Personal</option>
</select>
</div>
<div class="col-md-2">
<select id="prioridad" class="form-select">
<option value="Baja">Baja</option>
<option value="Media">Media</option>
<option value="Alta">Alta</option>
</select>
</div>
<div class="col-md-3">
<input type="date" id="fecha" class="form-control">
</div>
<div class="col-md-2">
<button onclick="agregarTarea()" class="btn btn-success w-100">Agregar</button>
</div>
</div>

<div class="mb-3">
<span id="contador" class="badge bg-secondary">0 tareas</span>
</div>

<div class="row g-3 mb-4">
<div class="col-md-4">
<label class="form-label">Filtrar por categoría:</label>
<select id="filterCategoria" class="form-select" onchange="filtrarTareas()">
<option value="">Todas</option>
<option value="General">General</option>
<option value="Trabajo">Trabajo</option>
<option value="Personal">Personal</option>
</select>
</div>
<div class="col-md-4">
<label class="form-label">Prioridad:</label>
<select id="filterPrioridad" class="form-select" onchange="filtrarTareas()">
<option value="">Todas</option>
<option value="Baja">Baja</option>
<option value="Media">Media</option>
<option value="Alta">Alta</option>
</select>
</div>
</div>

<ul id="listaTareas" class="list-group mb-4"></ul>

<button onclick="logout()" class="btn btn-danger">Cerrar Sesión</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
